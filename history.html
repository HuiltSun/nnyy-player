<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>观看记录 · 努努影院</title>
<style>
  :root{--bg:#0f1115;--panel:#171a21;--line:#262b36;--txt:#e6e8ec;--sub:#9aa3b0;--accent:#ec2d7a;--accent2:#2d8cec}
  *{box-sizing:border-box;scrollbar-width:none}
  *::-webkit-scrollbar{display:none}
  body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.5 system-ui,"Segoe UI","Microsoft YaHei",sans-serif;min-height:100vh}
  header{padding:14px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px}
  header h1{margin:0;font-size:16px;color:var(--accent);white-space:nowrap}
  .back{font-size:13px;color:var(--sub);text-decoration:none}
  .back:hover{color:var(--txt)}
  .spacer{flex:1}
  .count{font-size:12px;color:var(--sub)}
  .clear-btn{background:transparent;border:1px solid var(--line);color:var(--sub);
             padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px;font:inherit}
  .clear-btn:hover{border-color:var(--accent);color:var(--accent)}
  .container{padding:20px 24px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
  .card{background:var(--panel);border-radius:10px;overflow:hidden;cursor:pointer;
        border:1px solid var(--line);transition:border-color .15s,transform .15s,box-shadow .15s;
        display:flex;flex-direction:column}
  .card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 24px #0008}
  .card-cover{width:100%;aspect-ratio:3/4;object-fit:cover;background:#0a0c10;display:block;flex-shrink:0}
  .card-cover-placeholder{width:100%;aspect-ratio:16/9;background:#0a0c10;display:flex;
    align-items:center;justify-content:center;color:#2a3040;font-size:40px;flex-shrink:0}
  .card-body{padding:10px 12px;flex:1;display:flex;flex-direction:column;gap:4px}
  .card-title{font-weight:600;font-size:13px;line-height:1.3;
              display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-ep{font-size:12px;color:var(--sub)}
  .card-prog{height:3px;background:var(--line);border-radius:2px;overflow:hidden;margin-top:2px}
  .card-prog-bar{height:100%;background:var(--accent);border-radius:2px}
  .card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:6px}
  .card-time{font-size:11px;color:var(--sub)}
  .badge{display:inline-block;font-size:10px;padding:1px 5px;border-radius:3px;font-weight:600;line-height:1.4}
  .badge-nnyy{background:#ec2d7a22;color:#ec2d7a;border:1px solid #ec2d7a55}
  .badge-yh5dm{background:#f8920022;color:#f89200;border:1px solid #f8920055}
  .card-date{font-size:11px;color:#3a4050;margin-top:2px}
  .empty{text-align:center;padding:80px 20px;color:var(--sub)}
  .empty a{color:var(--accent);text-decoration:none}
  .empty a:hover{opacity:.8}
  .section-hdr{font-size:11px;color:var(--sub);letter-spacing:.06em;text-transform:uppercase;
               margin-bottom:14px;font-weight:600}
</style>
</head>
<body>
<header>
  <h1>观看记录</h1>
  <a class="back" href="/">← 返回播放器</a>
  <span class="spacer"></span>
  <span class="count" id="countLabel"></span>
  <button class="clear-btn" id="clearBtn">清除全部</button>
</header>
<div class="container">
  <div class="section-hdr" id="sectionHdr"></div>
  <div class="grid" id="grid"></div>
</div>

<script>
const LS_PROG = 'nnyy_progress';

function fmt(sec){
  const m=Math.floor(sec/60), s=String(Math.floor(sec%60)).padStart(2,'0');
  return `${m}:${s}`;
}

function load(){
  const grid=document.getElementById('grid');
  const count=document.getElementById('countLabel');
  const hdr=document.getElementById('sectionHdr');
  let all={};
  try{ all=JSON.parse(localStorage.getItem(LS_PROG))||{}; }catch{}

  const entries=Object.values(all).sort((a,b)=>new Date(b.at)-new Date(a.at));
  count.textContent=entries.length?`共 ${entries.length} 条`:'';
  hdr.textContent=entries.length?'最近观看':'';
  grid.innerHTML='';

  if(!entries.length){
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1">
      暂无观看记录，<a href="/">去搜索一部片子</a>
    </div>`;
    return;
  }

  entries.forEach(e=>{
    const pct=e.duration>0?Math.min(100,e.position/e.duration*100).toFixed(1):0;
    const badge=e.source==='yh5dm'
      ?'<span class="badge badge-yh5dm">樱花</span>'
      :'<span class="badge badge-nnyy">努努</span>';
    const timeStr=`${fmt(e.position)} / ${fmt(e.duration||0)}`;

    const card=document.createElement('div');
    card.className='card';

    // 封面
    let coverHtml='';
    if(e.cover){
      coverHtml=`<img class="card-cover" src="${e.cover}" alt="${e.title}"
        loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="card-cover-placeholder" style="display:none">▶</div>`;
    } else {
      coverHtml=`<div class="card-cover-placeholder">▶</div>`;
    }

    card.innerHTML=`
      ${coverHtml}
      <div class="card-body">
        <div class="card-title">${e.title}</div>
        <div class="card-ep">${e.ep_label||''}</div>
        <div class="card-prog"><div class="card-prog-bar" style="width:${pct}%"></div></div>
        <div class="card-footer">
          ${badge}
          <span class="card-time">${timeStr}</span>
        </div>
        <div class="card-date">${e.at||''}</div>
      </div>`;

    // 点击返回播放器并携带信息
    card.onclick=()=>{
      sessionStorage.setItem('nnyy_resume_hint', JSON.stringify({
        vid_id:e.vid_id, source:e.source, title:e.title, cat:e.cat||''
      }));
      window.location.href='/';
    };

    grid.appendChild(card);
  });
}

document.getElementById('clearBtn').onclick=()=>{
  if(confirm('确认清除全部观看记录？')){
    localStorage.removeItem(LS_PROG);
    load();
  }
};

load();
</script>
</body>
</html>
